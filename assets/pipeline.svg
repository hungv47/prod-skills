<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 3.5 L 0 7 z" fill="#6EE7B7"/></marker>
  </defs>

  <rect x="0" y="0" width="820" height="200" rx="12" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>

  <!-- Pipeline track -->
  <text x="100" y="28" text-anchor="middle" font-size="9" font-weight="600" fill="#065F46">DESIGN</text>
  <rect x="20" y="38" width="120" height="50" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="80" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#064E3B">user-flow</text>
  <text x="80" y="74" text-anchor="middle" font-size="8" fill="#047857">screens, transitions, edges</text>

  <path d="M 140 63 L 175 63" stroke="#6EE7B7" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>

  <text x="280" y="28" text-anchor="middle" font-size="9" font-weight="600" fill="#065F46">ARCHITECTURE</text>
  <rect x="185" y="38" width="165" height="50" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="267" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#064E3B">system-architecture</text>
  <text x="267" y="74" text-anchor="middle" font-size="8" fill="#047857">stack, schema, API, security</text>

  <!-- Horizontal skills -->
  <text x="410" y="128" text-anchor="middle" font-size="9" font-weight="600" fill="#065F46">HORIZONTAL — use anytime</text>

  <rect x="140" y="140" width="160" height="44" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="220" y="162" text-anchor="middle" font-size="11" fill="#047857">code-cleanup</text>
  <text x="220" y="174" text-anchor="middle" font-size="8" fill="#059669">audit, refactor, remove slop</text>

  <rect x="420" y="140" width="170" height="44" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="505" y="162" text-anchor="middle" font-size="11" fill="#047857">technical-writer</text>
  <text x="505" y="174" text-anchor="middle" font-size="8" fill="#059669">README, API docs, ship log</text>
</svg>
